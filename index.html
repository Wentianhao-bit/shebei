<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设备管理系统</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>
    <div class="container">
        <h1>设备管理系统</h1>
        
        <div class="controls">
            <button id="addEquipment">添加设备</button>
        </div>

        <div class="equipment-list" id="equipmentList">
            <!-- 设备列表将动态生成在这里 -->
        </div>

        <!-- 添加/编辑设备模态框 -->
        <div class="modal" id="equipmentModal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2 id="modalTitle">添加新设备</h2>
                <form id="equipmentForm">
                    <input type="hidden" id="equipmentId">
                    
                    <div class="form-group">
                        <label for="name">设备名称：</label>
                        <input type="text" id="name" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="type">设备类型：</label>
                        <input type="text" id="type" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="status">状态：</label>
                        <select id="status" required>
                            <option value="available">可用</option>
                            <option value="borrowed">已借出</option>
                            <option value="maintenance">维护中</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="borrower">借用人：</label>
                        <input type="text" id="borrower">
                    </div>
                    
                    <div class="form-group">
                        <label for="borrowDate">借用日期：</label>
                        <input type="date" id="borrowDate">
                    </div>
                    
                    <div class="form-group">
                        <label for="returnDate">归还日期：</label>
                        <input type="date" id="returnDate">
                    </div>
                    
                    <button type="submit">保存</button>
                </form>
            </div>
        </div>
    </div>

    <script src="js/firebase-config.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
